<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Mateus Abelli's personal website">
    <title>Mateus Abelli</title>
    <style>
        :root {
            color-scheme: light dark;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        p {
            display: flex;
            align-items: center;
        }

        a {
            color: inherit;
            text-underline-offset: 4px;

            display: inline-block;
            max-width: min(40vw, 100vw);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        body {
            background-color: #ffffff;
            display: grid;
            justify-items: center;
            min-height: 100vh;
            padding: 32px 24px;
            gap: 128px;
        }

        main {
            display: grid;
            justify-items: center;
            gap: 64px;
            align-self: center;
        }

        .avatar {
            width: clamp(100px, 30vw, 150px);
            height: clamp(100px, 30vw, 150px);
            border-radius: 100%;
            outline: 2px solid;
            outline-color: #000000;
        }

        .logo {
            width: clamp(260px, 80vw, 520px);
            height: clamp(24px, 80vw, 48px);
        }

        .bio {
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: clamp(16px, 4vw, 20px);
        }

        .footer-link,
        .social-link {
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-link>p,
        .social-link>p {
            display: flex;
            gap: 8px;
        }

        .header-group {
            display: grid;
            justify-items: center;
            gap: 16px;

        }

        footer {
            line-height: 1.5;
            font-size: 0.875rem;
            align-self: end;
        }

        .social-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            row-gap: 16px;
            column-gap: 32px;
        }

        svg path {
            fill: #000000;
        }

        @media (max-width: 600px) {
            .social-group {
                grid-template-columns: unset;
                margin-right: auto;
            }

            footer {
                margin-right: auto;
            }
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0D1117;
            }

            svg path {
                fill: #ffffff;
            }

            .avatar {
                outline-color: #ffffff;
            }
        }
    </style>
</head>
